<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>御膳智控 ERP</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#8B0000" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="御膳智控">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="https://i.imgur.com/ex06Jva.png">
    <link rel="icon" type="image/png" href="https://i.imgur.com/ex06Jva.png" />
    <link rel="shortcut icon" type="image/png" href="https://i.imgur.com/ex06Jva.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#8B0000', // Deep Crimson Red
              secondary: '#1A1A1A', 
              accent: '#FFD700',  // Pure Gold
              goldHover: '#E5C100',
              brandRed: '#C70000',
              background: '#FFF8F8', // Lighter red-tinted background (replaces Cream)
              surface: '#FFFFFF',
              error: '#B00020',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              serif: ['Noto Serif SC', 'serif'],
            },
            boxShadow: {
              'gold': '0 4px 14px 0 rgba(255, 215, 0, 0.3)',
              'red': '0 4px 14px 0 rgba(139, 0, 0, 0.3)',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
<style>
  /* Global Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: #FFF8F8;
  }
  ::-webkit-scrollbar-thumb {
    background: #E5E5E5;
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #8B0000;
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-secondary antialiased selection:bg-primary selection:text-accent overscroll-none">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW registered', reg))
            .catch(err => console.log('SW failed', err));
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
